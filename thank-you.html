<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - NODE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body id="top">
    <nav class="navbar">
        <div class="container nav-container">

                <a href="index.html" class="logo">

            </div>

    <main>
        <section class="thank-you-section" style="padding: 120px 0; min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center;">

                <h1 style="margin-bottom: 16px;">Thanks for reaching out!</h1>
                <p style="color: var(--text-muted); margin-bottom: 40px; font-size: 1.2rem; max-width: 600px; margin-left: auto; margin-right: auto;">

                <a href="shop.html" class="btn btn-primary btn-lg">Back to Shop</a>

    <footer class="site-footer">
        <div class="container footer-container" style="justify-content: center;">
            <p>&copy; 2026 NODE. All rights reserved.</p>
        </div>
